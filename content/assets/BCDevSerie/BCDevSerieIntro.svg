<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001B3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002B50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B7C3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#00B7C3;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003A6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002550;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern (blueprint feel) -->
  <g opacity="0.04" stroke="#50E6FF" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Connecting path between blocks (journey road) -->
  <path d="M 100,440 C 155,440 170,380 225,380 C 280,380 295,440 350,440 C 405,440 420,380 475,380 C 530,380 545,440 600,440 C 655,440 670,380 725,380 C 780,380 795,440 850,440 C 905,440 920,380 975,380 C 1030,380 1045,440 1100,440"
        stroke="url(#pathGrad)" stroke-width="4" fill="none" stroke-dasharray="12,6" opacity="0.7"/>

  <!-- Building blocks representing series topics -->
  <!-- Block 1: AI -->
  <g filter="url(#softShadow)" transform="translate(50, 360)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">AI for</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">BC Dev</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Copilot, LLMs</text>
  </g>

  <!-- Block 2: Types -->
  <g filter="url(#softShadow)" transform="translate(190, 300)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Types</text>
    <text x="50" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">PTE vs</text>
    <text x="50" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">AppSource</text>
  </g>

  <!-- Block 3: Architecture -->
  <g filter="url(#softShadow)" transform="translate(330, 360)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Archi-</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">tecture</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Split or not?</text>
  </g>

  <!-- Block 4: Dependencies -->
  <g filter="url(#softShadow)" transform="translate(470, 300)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Depen-</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">dencies</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">NuGet</text>
  </g>

  <!-- Block 5: DevProcess -->
  <g filter="url(#softShadow)" transform="translate(610, 360)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Dev</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Process</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Git, CI/CD</text>
  </g>

  <!-- Block 6: Testing -->
  <g filter="url(#softShadow)" transform="translate(750, 300)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Testing</text>
    <text x="50" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Automated</text>
  </g>

  <!-- Block 7: Performance -->
  <g filter="url(#softShadow)" transform="translate(890, 360)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Perfor-</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">mance</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Speed</text>
  </g>

  <!-- Block 8: Delivery & Maintenance -->
  <g filter="url(#softShadow)" transform="translate(1030, 300)">
    <rect width="100" height="100" rx="8" fill="url(#blockGrad)" stroke="#0078D4" stroke-width="1.5" opacity="0.9"/>
    <text x="50" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">Delivery</text>
    <text x="50" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#50E6FF" text-anchor="middle" font-weight="600">&amp; Maint.</text>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8ECAE6" text-anchor="middle">Upgrades</text>
  </g>

  <!-- Code bracket decorations -->
  <text x="30" y="420" font-family="Consolas, monospace" font-size="80" fill="#0078D4" opacity="0.12">{</text>
  <text x="1130" y="420" font-family="Consolas, monospace" font-size="80" fill="#0078D4" opacity="0.12">}</text>

  <!-- Title area -->
  <text x="600" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="700" filter="url(#glow)">BC Development Serie</text>

  <!-- Accent line under title -->
  <rect x="350" y="125" width="500" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Subtitle -->
  <text x="600" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#8ECAE6" text-anchor="middle">Best Practices &amp; Patterns for Business Central</text>

  <!-- Small decorative dots -->
  <circle cx="200" cy="170" r="3" fill="#00B7C3" opacity="0.5"/>
  <circle cx="220" cy="165" r="2" fill="#0078D4" opacity="0.5"/>
  <circle cx="980" cy="170" r="3" fill="#00B7C3" opacity="0.5"/>
  <circle cx="1000" cy="165" r="2" fill="#0078D4" opacity="0.5"/>

  <!-- AL code snippet decoration (top right) -->
  <g transform="translate(900, 20)" opacity="0.1">
    <text font-family="Consolas, monospace" font-size="12" fill="#50E6FF">
      <tspan x="0" dy="0">codeunit 50100 MyCodeunit</tspan>
      <tspan x="0" dy="16">{</tspan>
      <tspan x="0" dy="16">    procedure DoSomething()</tspan>
      <tspan x="0" dy="16">    begin</tspan>
      <tspan x="0" dy="16">        // Best practices</tspan>
      <tspan x="0" dy="16">    end;</tspan>
      <tspan x="0" dy="16">}</tspan>
    </text>
  </g>

  <!-- AL code snippet decoration (bottom left) -->
  <g transform="translate(30, 500)" opacity="0.08">
    <text font-family="Consolas, monospace" font-size="11" fill="#50E6FF">
      <tspan x="0" dy="0">tableextension 50100 MyExt</tspan>
      <tspan x="0" dy="15">    extends "Sales Header"</tspan>
      <tspan x="0" dy="15">{</tspan>
      <tspan x="0" dy="15">    fields { }</tspan>
      <tspan x="0" dy="15">}</tspan>
    </text>
  </g>

  <!-- "Part 1" badge -->
  <g transform="translate(600, 200)">
    <rect x="-45" y="0" width="90" height="28" rx="14" fill="url(#accentGrad)" opacity="0.9"/>
    <text x="0" y="19" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">Part 1</text>
  </g>

  <!-- Gear icon decoration (top left) -->
  <g transform="translate(60, 60)" opacity="0.07">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#50E6FF" stroke-width="8"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#50E6FF" stroke-width="4"/>
    <rect x="-4" y="-35" width="8" height="12" fill="#50E6FF"/>
    <rect x="-4" y="23" width="8" height="12" fill="#50E6FF"/>
    <rect x="-35" y="-4" width="12" height="8" fill="#50E6FF"/>
    <rect x="23" y="-4" width="12" height="8" fill="#50E6FF"/>
  </g>

  <!-- Bottom attribution -->
  <text x="600" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#0078D4" text-anchor="middle">blog.kine.cz</text>
</svg>